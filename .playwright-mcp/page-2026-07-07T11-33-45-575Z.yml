    - generic [ref=e68]:
      - generic [ref=e69]:
        - generic [ref=e70]: AI+学科交叉
        - generic [ref=e71]:
          - generic [ref=e72]: 全智赛组委会编辑
          - generic [ref=e73]: 2026-05-06
          - generic [ref=e74]: 2,656 次阅读
      - generic [ref=e75]:
        - heading [level=6] [ref=e76]
        - heading "一、赛题说明" [level=6] [ref=e77]
        - paragraph [ref=e78]: 聚焦“人工智能+学科交叉”的深度融合创新，鼓励参赛团队立足某一具体学科专业（涵盖理、工、农、医、文、法、经、管等全学科领域），运用人工智能技术或产品赋能学科的理论研究、科研探索、教学实践、实验实训、自主学习等核心环节。通过竞赛推动人工智能技术与学科特色的深度适配，探索学科发展新方法、挖掘学科领域新知识、培育专业应用新技能。
        - heading "二、作品范围参考" [level=6] [ref=e79]
        - paragraph [ref=e80]: 包括但不限于：理科数据分析与建模、工科仿真设计智能辅助、医科临床技能训练、文科文献挖掘与分析、教育个性化教学推荐、学科实验实训智能指导、科研数据处理与可视化等适配具体学科发展的AI赋能新思路、新路径、软硬件产品和解决方案。
        - heading "三、作品要求" [level=6] [ref=e81]
        - paragraph [ref=e82]:
          - text: 1. 参赛作品需明确聚焦某一具体学科专业（需在方案中清晰界定学科领域及应用场景），围绕该学科的理论研究、教学、实验、科研或学习等至少一个核心环节展开，体现人工智能技术的赋能价值。
          - text: 2. 作品形式不限（可包括技术方案、软件工具、教学系统、实验平台、科研辅助工具等），需深度融合人工智能技术与学科专业需求，避免技术与学科场景脱节。
          - text: 3. 提交材料需包含完整的技术方案，包括学科需求分析报告、AI技术应用方案、作品功能说明、效果验证依据（如教学试点数据、科研效率提升证明、用户反馈等），跨专业组队需说明成员分工与协作机制。
          - text: 4. 需突出作品的创新点，包括但不限于学科问题解决新方法、教学科研新模式、技术应用新场景等，对比传统学科建设方式的优势。
          - text: 5. 作品需具备可行性与推广价值，需说明在同类学科或院校的复用条件、实施成本及落地路径，鼓励提供小规模试点应用案例。
          - text: 6. 作品需符合相关学科规范与教育行业标准，无知识产权争议，涉及教学数据、科研成果的需提供合法授权说明，尊重学术伦理。
        - heading "四、评分规则" [level=6] [ref=e83]
        - paragraph [ref=e84]:
          - strong [ref=e85]: AI+学科交叉-评分规则
