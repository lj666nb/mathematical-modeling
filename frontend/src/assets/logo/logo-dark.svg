<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <!-- ============================================================
       深色版主徽章 - AI计科智能实训平台（侧边栏专用）
       配色：浅天蓝#69B1FF / 白色线条 / 半透明柔光描边
       ============================================================ -->

  <!-- 徽章图形 (36×36区域) -->
  <g transform="translate(18, 18)">
    <!-- 外框 -->
    <rect x="-18" y="-18" width="36" height="36" rx="6" stroke="rgba(255,255,255,0.12)" stroke-width="0.7" fill="none"/>

    <!-- 代码大括号 + 中心枢纽 -->
    <g transform="translate(0, 0)">
      <!-- 左大括号 -->
      <path d="M-7.5 -10 Q-11 -10 -11 -5 Q-11 0 -13.5 0 Q-11 0 -11 5 Q-11 10 -7.5 10"
            stroke="white" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.8"/>
      <!-- 右大括号 -->
      <path d="M7.5 -10 Q11 -10 11 -5 Q11 0 13.5 0 Q11 0 11 5 Q11 10 7.5 10"
            stroke="white" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.8"/>

      <!-- 菱形API节点 -->
      <path d="M0 -3 L3 0 L0 3 L-3 0 Z" stroke="#69B1FF" stroke-width="0.7" fill="none"/>
      <circle cx="0" cy="0" r="1" fill="#69B1FF" opacity="0.9"/>

      <!-- 3条数据流曲线 -->
      <path d="M-9 -6 C-7 -5 -4 -3 0 0" stroke="#69B1FF" stroke-width="0.7" fill="none" opacity="0.5" stroke-linecap="round"/>
      <path d="M9 -6 C7 -5 4 -3 0 0" stroke="#69B1FF" stroke-width="0.7" fill="none" opacity="0.5" stroke-linecap="round"/>
      <path d="M-4 9 C-2 6 -1 3 0 0" stroke="#69B1FF" stroke-width="0.7" fill="none" opacity="0.5" stroke-linecap="round"/>
      <path d="M4 9 C2 6 1 3 0 0" stroke="#69B1FF" stroke-width="0.7" fill="none" opacity="0.3" stroke-linecap="round"/>
    </g>

    <!-- 自适应曲线 -->
    <path d="M-11 10 Q-5 13 0 9 Q5 5 11 7"
          stroke="#69B1FF" stroke-width="0.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- 右侧文字 -->
  <g transform="translate(45, 0)">
    <text x="0" y="26" font-family="'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"
          font-size="14" font-weight="700" fill="white" letter-spacing="0.5">AI计科智能实训平台</text>
    <text x="0" y="42" font-family="'Helvetica Neue','PingFang SC',sans-serif"
          font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="0.3" font-weight="300">多智能体计算机学科交叉实训系统</text>
  </g>
</svg>
