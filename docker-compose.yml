# ============================================================
# Docker Compose 统一编排文件
# 应用场景：AI 数学建模智能教学平台 一键部署
# 服务列表：前端(Nginx) + 后端(FastAPI) + Redis(缓存)
# 网络模式：bridge内部网络，容器间通过服务名通信
# 数据持久化：宿主机挂载卷保存SQLite数据库、论文产物、用户上传
# 兼容平台：Windows/Linux/Mac
# ============================================================

services:
  # ---------- Redis 缓存服务 ----------
  redis:
    image: redis:7-alpine
    container_name: ai-tutoring-redis
    # 持久化Redis数据到宿主机
    volumes:
      - redis_data:/data
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    # 限制资源占用（学生笔记本友好）
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - app-network

  # ---------- 后端 FastAPI 服务 ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-tutoring-backend
    # 等待Redis就绪后再启动
    depends_on:
      redis:
        condition: service_healthy
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 环境变量
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      # JWT密钥：生产环境必须通过 .env 文件覆盖
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-}
    # 加载宿主机 .env 文件（优先级低于 environment 中显式设置的值）
    env_file:
      - .env
    # 数据持久化
    volumes:
      - backend_data:/app/data           # SQLite 数据库
      - paper_output:/app/paper_output   # 论文引擎产物（与 MathModel Skill 共享）
      - problem_files:/app/problem_files # 用户上传赛题文件
    # 暴露端口（仅内部网络通信，前端通过Nginx反向代理）
    expose:
      - "8000"
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - app-network

  # ---------- 前端 Nginx 服务 ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-tutoring-frontend
    depends_on:
      backend:
        condition: service_healthy
    # 映射宿主机80端口 -> 容器内Nginx 80端口
    ports:
      - "${FRONTEND_PORT:-80}:80"
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    networks:
      - app-network

# ---------- 数据卷定义 ----------
volumes:
  # Redis持久化数据
  redis_data:
    driver: local
  # 后端SQLite数据库持久化
  backend_data:
    driver: local
  # 论文引擎产物（paper_output/）
  paper_output:
    driver: local
  # 用户上传赛题文件（problem_files/）
  problem_files:
    driver: local

# ---------- 内部网络 ----------
networks:
  app-network:
    driver: bridge
